name: Deploy Supabase Edge Functions

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/functions/**'
  workflow_dispatch:  # allows manual trigger from GitHub UI
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy edge functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase functions deploy profile-startup \
            --project-ref gfcdtvpxrirkqfceleuy \
            --no-verify-jwt

          supabase functions deploy get-startup \
            --project-ref gfcdtvpxrirkqfceleuy \
            --no-verify-jwt

          supabase functions deploy get-startups \
            --project-ref gfcdtvpxrirkqfceleuy \
            --no-verify-jwt

          supabase functions deploy get-job \
            --project-ref gfcdtvpxrirkqfceleuy \
            --no-verify-jwt

      - name: Set edge function secrets
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          echo "${{ secrets.ANTHROPIC_API_KEY }}" | \
            supabase secrets set ANTHROPIC_API_KEY \
            --project-ref gfcdtvpxrirkqfceleuy
          
          echo "${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" | \
            supabase secrets set SUPABASE_SERVICE_ROLE_KEY \
            --project-ref gfcdtvpxrirkqfceleuy
