name: Deploy Supabase Edge Functions
on:
  workflow_dispatch:
  push:
    branches: [main]
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Deploy functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase functions deploy profile-startup --project-ref gfcdtvpxrirkqfceleuy --no-verify-jwt
          supabase functions deploy get-startup --project-ref gfcdtvpxrirkqfceleuy --no-verify-jwt
          supabase functions deploy get-startups --project-ref gfcdtvpxrirkqfceleuy --no-verify-jwt
          supabase functions deploy get-job --project-ref gfcdtvpxrirkqfceleuy --no-verify-jwt
      - name: Set secrets
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          supabase secrets set ANTHROPIC_API_KEY="$ANTHROPIC_API_KEY" SUPABASE_SERVICE_ROLE_KEY="$SUPABASE_SERVICE_ROLE_KEY" --project-ref gfcdtvpxrirkqfceleuy
